<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Nexora – Deine Suchmaschine</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      text-align: center;
      padding: 40px;
      margin: 0;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
    }

    .header img {
      height: 80px;
      margin-bottom: 10px;
    }

    .header h1 {
      font-size: 3rem;
      margin: 0;
      color: #38bdf8;
    }

    p {
      color: #9ca3af;
    }

    input[type="text"] {
      width: 60%;
      max-width: 500px;
      padding: 10px 14px;
      font-size: 1rem;
      border-radius: 999px;
      border: 1px solid #4b5563;
      outline: none;
      background: #020617;
      color: #e5e7eb;
    }

    input[type="text"]:focus {
      border-color: #38bdf8;
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="nexora-logo.png" alt="Nexora Logo">
    <h1>Nexora</h1>
  </div>

  <p>Die Suchmaschine für deine Inhalte.</p>

  <input type="text" id="searchInput" placeholder="Suchbegriff eingeben...">

  <script>
    const input = document.getElementById("searchInput");

    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        const q = input.value.trim();
        if (q !== "") {
          window.location.href = "results.html?q=" + encodeURIComponent(q);
        }
      }
    });
  </script>

</body>
</html>
