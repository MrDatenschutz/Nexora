<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Nexora – Startseite</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
      padding: 50px;
    }
    #logo {
      width: 150px;
      margin-bottom: 20px;
    }
    h1 {
      color: #333;
    }
    input[type="text"] {
      padding: 10px;
      width: 300px;
      font-size: 16px;
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }
    #searchBtn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 20px;
      color: green;
    }
  </style>
</head>
<body>

  <img id="logo" src="nexora-logo.png" alt="Nexora Logo">
  <h1>Willkommen bei Nexora</h1>

  <p>Bitte registriere dich, um die Suche zu nutzen.</p>

  <button onclick="window.location.href='https://backend-f-r-registrierung.onrender.com'">
    Jetzt registrieren
  </button>

  <div id="searchSection">
    <input type="text" id="searchInput" placeholder="Suchbegriff eingeben..." disabled>
    <br>
    <button id="searchBtn" disabled>Suchen</button>
  </div>

  <div id="status"></div>

  <script>
    // Simulierter Login-Status (später durch echten Login ersetzen)
    const isRegistered = false; // ← später dynamisch setzen

    if (isRegistered) {
      document.getElementById("searchInput").disabled = false;
      document.getElementById("searchBtn").disabled = false;
      document.getElementById("status").textContent = "Du bist eingeloggt. Suche aktiviert.";
    }
  </script>

</body>
</html>
