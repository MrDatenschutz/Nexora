<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Nexora – Startseite</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }
    #logo {
      width: 120px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 36px;
      color: #00aaff;
    }
    input[type="text"] {
      padding: 10px;
      width: 300px;
      font-size: 16px;
      margin-top: 20px;
      border: none;
      border-radius: 5px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #searchBtn:disabled {
      background-color: #444;
      color: #888;
      cursor: not-allowed;
    }
    #searchBtn {
      background-color: #00aaff;
      color: #fff;
    }
    #registerBtn {
      background-color: #ffaa00;
      color: #000;
    }
    #status {
      margin-top: 20px;
      color: #00ff88;
    }
  </style>
</head>
<body>

  <img id="logo" src="nexora-logo.png" alt="Nexora Logo">
  <h1>Nexora</h1>

  <p>Du musst dich registrieren, um die Suche zu nutzen.</p>

  <button id="registerBtn" onclick="window.location.href='https://backend-f-r-registrierung.onrender.com'">
    Jetzt registrieren
  </button>

  <div id="searchSection">
    <input type="text" id="searchInput" placeholder="Suchbegriff eingeben..." disabled>
    <br>
    <button id="searchBtn" disabled>Suchen</button>
  </div>

  <div id="status"></div>

  <script>
    // Später durch echten Login ersetzen
    const isRegistered = false; // ← hier Login-Status setzen

    if (isRegistered) {
      document.getElementById("searchInput").disabled = false;
      document.getElementById("searchBtn").disabled = false;
      document.getElementById("status").textContent = "Du bist eingeloggt. Suche aktiviert.";
    }
  </script>

</body>
</html>
