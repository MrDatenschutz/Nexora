<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Nexora – Startseite</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: #ffffff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
    }
    header {
      margin-top: 40px;
      text-align: center;
    }
    #logo {
      width: 120px;
      display: block;
      margin: 0 auto 10px auto;
    }
    h1 {
      font-size: 36px;
      color: #00aaff;
      margin: 0;
    }
    #authButtons {
      margin-top: 20px;
    }
    #authButtons button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #registerBtn {
      background-color: #ffaa00;
      color: #000;
    }
    #loginBtn {
      background-color: #00aaff;
      color: #fff;
    }
    #searchSection {
      margin-top: 40px;
      text-align: center;
    }
    #searchInput {
      padding: 10px;
      width: 320px;
      font-size: 16px;
      border-radius: 5px;
      border: none;
    }
    #searchBtn {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: #00aaff;
      color: #fff;
    }
    #searchInput:disabled,
    #searchBtn:disabled {
      background-color: #333;
      color: #888;
      cursor: not-allowed;
    }
    #hint {
      margin-top: 15px;
      color: #ff8800;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <header>
    <img id="logo" src="nexora-logo.png" alt="Nexora Logo">
    <h1>Nexora</h1>
  </header>

  <div id="authButtons">
    <button id="registerBtn" onclick="window.location.href='https://backend-f-r-registrierung.onrender.com'">
      Registrieren
    </button>

    <button id="loginBtn" onclick="window.location.href='login.html'">
      Login
    </button>
  </div>

  <div id="searchSection">
    <input type="text" id="searchInput" name="q" placeholder="Suchbegriff eingeben..." disabled>
    <br>
    <button id="searchBtn" disabled>Suchen</button>
    <div id="hint">Bitte zuerst einloggen, um die Suche zu nutzen.</div>
  </div>

</body>
</html>
