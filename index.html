<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Nexora – Deine Suchmaschine</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      text-align: center;
      padding: 40px;
      margin: 0;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
    }

    .header img {
      height: 80px;
      margin-bottom: 10px;
    }

    .header h1 {
      font-size: 3rem;
      margin: 0;
      color: #38bdf8;
    }

    p {
      color: #9ca3af;
    }

    input[type="text"] {
      width: 60%;
      max-width: 500px;
      padding: 10px 14px;
      font-size: 1rem;
      border-radius: 999px;
      border: 1px solid #4b5563;
      outline: none;
      background: #020617;
      color: #e5e7eb;
    }

    input[type="text"]:focus {
      border-color: #38bdf8;
    }

    #results {
      margin-top: 30px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }

    .result-item {
      padding: 10px 14px;
      border-radius: 8px;
      background: #020617;
      margin-bottom: 10px;
      border: 1px solid #1f2937;
    }

    .result-item a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: bold;
    }

    .result-item a:hover {
      text-decoration: underline;
    }

    .result-desc {
      font-size: 0.9rem;
      color: #9ca3af;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <!-- Logo + Titel -->
  <div class="header">
    <img src="nexora-logo.png" alt="Nexora Logo">
    <h1>Nexora</h1>
  </div>

  <p>Die Suchmaschine für deine Inhalte.</p>

  <!-- Suchfeld -->
  <input type="text" id="searchInput" placeholder="Suchbegriff eingeben...">
  <div id="results"></div>

  <script>
    const pages = [
      {
        title: "Startseite",
        url: "index.html",
        content: "Willkommen bei Nexora. Dies ist die Startseite deiner Suchmaschine."
      },
      {
        title: "Über Nexora",
        url: "ueber-nexora.html",
        content: "Nexora ist eine moderne Suchmaschine, die deine Inhalte durchsucht."
      },
      {
        title: "Kontakt",
        url: "kontakt.html",
        content: "Hier kannst du den Entwickler von Nexora kontaktieren."
      },
      {
        title: "Amazon",
        url: "index.html",
        content: "Amazon ist ein Online-Marktplatz. Diese Seite ist ein Testeintrag für die Suche."
      }
    ];

    const input = document.getElementById("searchInput");
    const resultsDiv = document.getElementById("results");

    input.addEventListener("input", function () {
      const query = this.value.trim().toLowerCase();
      resultsDiv.innerHTML = "";

      if (query === "") return;

      const results = pages.filter(page =>
        page.title.toLowerCase().includes(query) ||
        page.content.toLowerCase().includes(query)
      );

      if (results.length === 0) {
        resultsDiv.innerHTML = "<p>Keine Treffer gefunden.</p>";
        return;
      }

      results.forEach(item => {
        const div = document.createElement("div");
        div.className = "result-item";
        div.innerHTML = `
          <a href="${item.url}">${item.title}</a>
          <div class="result-desc">${item.content}</div>
        `;
        resultsDiv.appendChild(div);
      });
    });
  </script>

</body>
</html>
