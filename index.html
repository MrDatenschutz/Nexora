<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Nexora – Deine kompetente Suchmaschine</title>
  <script src="lunr.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      text-align: center;
      padding: 40px;
      margin: 0;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
    }

    .header img {
      height: 80px;
      margin-bottom: 10px;
    }

    .header h1 {
      font-size: 3rem;
      margin: 0;
      color: #38bdf8;
    }

    p {
      color: #9ca3af;
    }

    input[type="text"] {
      width: 60%;
      max-width: 500px;
      padding: 10px 14px;
      font-size: 1rem;
      border-radius: 999px;
      border: 1px solid #4b5563;
      outline: none;
      background: #020617;
      color: #e5e7eb;
    }

    input[type="text"]:focus {
      border-color: #38bdf8;
    }

    #results {
      margin-top: 30px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }

    .result-item {
      padding: 10px 14px;
      border-radius: 8px;
      background: #020617;
      margin-bottom: 10px;
      border: 1px solid #1f2937;
    }

    .result-item a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: bold;
    }

    .result-item a:hover {
      text-decoration: underline;
    }

    .result-desc {
      font-size: 0.9rem;
      color: #9ca3af;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <!-- Logo + Titel -->
  <div class="header">
    <img src="nexora-logo.png" alt="Nexora Logo">
    <h1>Nexora</h1>
  </div>

  <p>Die Suchmaschine für deine Inhalte.</p>

  <!-- Suchfeld -->
  <input type="text" id="searchInput" placeholder="Suchbegriff eingeben...">
  <div id="results"></div>

  <script>
    // Lunr.js Index erstellen
    const idx = lunr(function () {
      this.field('title');
      this.field('content');
      this.ref('id');

      this.add({ id: 1, title: "Startseite", content: "Willkommen bei Nexora. Dies ist die Startseite deiner Suchmaschine." });
      this.add({ id: 2, title: "Über Nexora", content: "Nexora ist eine moderne Suchmaschine, die deine Inhalte durchsucht." });
      this.add({ id: 3, title: "Kontakt", content: "Hier kannst du den Entwickler von Nexora kontaktieren." });
      this.add({ id: 4, title: "Begrüßung", content: "Hi! Schön, dass du Nexora ausprobierst. Hier findest du Hilfe und Infos." });
    });

    // Daten für die Trefferanzeige
    const indexData = {
      1: { title: "Startseite", url: "index.html", content: "Willkommen bei Nexora. Dies ist die Startseite deiner Suchmaschine." },
      2: { title: "Über Nexora", url: "ueber-nexora.html", content: "Nexora ist eine moderne Suchmaschine, die deine Inhalte durchsucht." },
      3: { title: "Kontakt", url: "kontakt.html", content: "Hier kannst du den Entwickler von Nexora kontaktieren." },
      4: { title: "Begrüßung", url: "index.html", content: "Hi! Schön, dass du Nexora ausprobierst. Hier findest du Hilfe und Infos." }
    };

    // Suchlogik
    const input = document.getElementById("searchInput");
    const resultsDiv = document.getElementById("results");

    input.addEventListener("input", function () {
      const query = this.value.trim();
      resultsDiv.innerHTML = "";

      if (query === "") return;

      const results = idx.search(query);

      if (results.length === 0) {
        resultsDiv.innerHTML = "<p>Keine Treffer gefunden.</p>";
        return;
      }

      results.forEach(result => {
        const item = indexData[result.ref];
        const div = document.createElement("div");
        div.className = "result-item";
        div.innerHTML = `
          <a href="${item.url}">${item.title}</a>
          <div class="result-desc">${item.content}</div>
        `;
        resultsDiv.appendChild(div);
      });
    });
  </script>

</body>
</html>
