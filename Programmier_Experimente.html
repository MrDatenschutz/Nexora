<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>! Disclaimer !</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 3rem;
      color: #38bdf8;
      margin-bottom: 20px;
    }

    .announce-box {
      background: #020617;
      border: 1px solid #1f2937;
      border-radius: 10px;
      max-width: 700px;
      margin: 30px auto;
      padding: 25px;
      text-align: left;
    }

    .announce-text {
      color: #9ca3af;
      font-size: 1.1rem;
      line-height: 1.7;
      white-space: pre-line;
    }

    /* Standard Button */
    .back-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #38bdf8;
      color: #000;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
    }

    .back-btn:hover {
      background: #0ea5e9;
    }

    /* SCHMALER Download-Button */
    .download-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 8px 16px;
      background: #38bdf8;
      color: #000;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1rem;
    }

    .download-btn:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

  <h1>! Disclaimer !</h1>

  <div class="announce-box">
    <div class="announce-text">

      ! Achtung !
      Alle auf dieser Veröffentlichten Programmier Experimente dienen ausschließlich zu Lern- und Testzwecken. Die folgenden Dateien sind nur im Eigengebrauch zu verwenden. ! Es wird vor epileptischen Anfällen gewahrnt ! 

      <!-- Download Button direkt unter dem Text -->
      <div style="text-align:center;">

        <!-- HIER ÄNDERST DU DEN LINKNAMEN -->
        <a href="https://mrdatenschutz.github.io/Nexora/happynuke.zip"
           download="happynuke.zip"
           class="download-btn">
           Happynuke   <!-- <- Linkname -->
        </a>

      </div>

    </div>
  </div>

  <a href="index.html" class="back-btn">Zur Startseite</a>

</body>
</html>
