<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Suchergebnisse – Nexora</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 0 10px;
    }

    .header img {
      height: 80px;
      margin-bottom: 10px;
    }

    .header h1 {
      font-size: 2.5rem;
      margin: 0;
      color: #38bdf8;
    }

    .search-area {
      margin-top: 20px;
    }

    .search-area input {
      width: 60%;
      max-width: 500px;
      padding: 10px 14px;
      font-size: 1rem;
      border-radius: 999px;
      border: 1px solid #4b5563;
      outline: none;
      background: #020617;
      color: #e5e7eb;
    }

    .search-area input:focus {
      border-color: #38bdf8;
    }

    #results {
      margin-top: 40px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }

    .result-item {
      background: #020617;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #1f2937;
      margin-bottom: 20px;
    }

    .result-item a {
      color: #38bdf8;
      font-size: 1.3rem;
      text-decoration: none;
      font-weight: bold;
    }

    .result-item a:hover {
      text-decoration: underline;
    }

    .result-desc {
      color: #cbd5e1;
      font-size: 1rem;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="nexora-logo.png" alt="Nexora Logo">
    <h1>Nexora</h1>
  </div>

  <div class="search-area">
    <input id="searchInput" type="text" placeholder="Suchbegriff eingeben...">
  </div>

  <div id="results"></div>

  <script>
    const pages = [
      { title: "Amazon – Startseite", url: "https://www.amazon.de", content: "Amazon ist ein großer Online-Marktplatz für Produkte aller Art." },
      { title: "Amazon – Elektronik", url: "https://www.amazon.de/s?k=elektronik", content: "Elektronikprodukte auf Amazon: Fernseher, Smartphones, Zubehör." },
      { title: "Amazon – Angebote", url: "https://www.amazon.de/gp/goldbox", content: "Tagesangebote und Rabatte auf Amazon." },

      { title: "YouTube – Startseite", url: "https://www.youtube.com", content: "YouTube ist eine Plattform für Videos, Streams und Musik." },
      { title: "YouTube – Trends", url: "https://www.youtube.com/feed/trending", content: "Aktuelle Trends und beliebte Videos auf YouTube." },
      { title: "YouTube – Musik", url: "https://www.youtube.com/music", content: "YouTube Music: Musikvideos, Playlists und Songs." },

      { title: "Chefkoch – Startseite", url: "https://www.chefkoch.de", content: "Chefkoch bietet Rezepte, Kochideen und Backtipps." },
      { title: "Chefkoch – Beliebte Rezepte", url: "https://www.chefkoch.de/rezepte/", content: "Beliebte Rezepte und Kochanleitungen." },
      { title: "Chefkoch – Kategorien", url: "https://www.chefkoch.de/magazin/", content: "Kochkategorien, Tipps und Ernährung." },

      { title: "Wikipedia – Startseite", url: "https://de.wikipedia.org", content: "Wikipedia ist ein freies Online-Lexikon." },
      { title: "Wikipedia – Zufälliger Artikel", url: "https://de.wikipedia.org/wiki/Spezial:Zuf%C3%A4llige_Seite", content: "Zufälliger Artikel aus Wikipedia." },
      { title: "Wikipedia – Aktuelle Ereignisse", url: "https://de.wikipedia.org/wiki/Portal:Aktuelles", content: "Aktuelle Nachrichten und Ereignisse auf Wikipedia." }
    ];

    const input = document.getElementById("searchInput");
    const resultsDiv = document.getElementById("results");

    const urlParams = new URLSearchParams(window.location.search);
    const query = urlParams.get("q");

    if (query) {
      input.value = query;
      performSearch(query);
    }

    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        performSearch(input.value);
      }
    });

    function performSearch(q) {
      const query = q.trim().toLowerCase();
      resultsDiv.innerHTML = "";

      const results = pages.filter(page =>
        page.title.toLowerCase().includes(query) ||
        page.content.toLowerCase().includes(query)
      );

      if (results.length === 0) {
        resultsDiv.innerHTML = "<p>Keine Treffer gefunden.</p>";
        return;
      }

      results.forEach(item => {
        const div = document.createElement("div");
        div.className = "result-item";
        div.innerHTML = `
          <a href="${item.url}" target="_blank">${item.title}</a>
          <div class="result-desc">${item.content}</div>
        `;
        resultsDiv.appendChild(div);
      });
    }
  </script>

</body>
</html>
