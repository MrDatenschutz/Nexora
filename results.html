<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Suchergebnisse – Nexora</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 0 10px;
    }

    .header img {
      height: 80px;
      margin-bottom: 10px;
    }

    .header h1 {
      font-size: 2.5rem;
      margin: 0;
      color: #38bdf8;
    }

    .search-area {
      margin-top: 20px;
    }

    .search-area input {
      width: 60%;
      max-width: 500px;
      padding: 10px 14px;
      font-size: 1rem;
      border-radius: 999px;
      border: 1px solid #4b5563;
      outline: none;
      background: #020617;
      color: #e5e7eb;
    }

    .search-area input:focus {
      border-color: #38bdf8;
    }

    #results {
      margin-top: 40px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }

    .result-item {
      background: #020617;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #1f2937;
      margin-bottom: 20px;
    }

    .result-item a {
      color: #38bdf8;
      font-size: 1.3rem;
      text-decoration: none;
      font-weight: bold;
    }

    .result-item a:hover {
      text-decoration: underline;
    }

    .result-desc {
      color: #cbd5e1;
      font-size: 1rem;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="nexora-logo.png" alt="Nexora Logo">
    <h1>Nexora</h1>
  </div>

  <div class="search-area">
    <input id="searchInput" type="text" placeholder="Suchbegriff eingeben...">
  </div>

  <div id="results"></div>

  <script>
    const pages = [
      {
        title: "Startseite",
        url: "index.html",
        content: "Willkommen bei Nexora. Dies ist die Startseite deiner Suchmaschine."
      },
      {
        title: "Über Nexora",
        url: "ueber-nexora.html",
        content: "Nexora ist eine moderne Suchmaschine, die deine Inhalte durchsucht."
      },
      {
        title: "Kontakt",
        url: "kontakt.html",
        content: "Hier kannst du den Entwickler von Nexora kontaktieren."
      },
      {
        title: "Amazon",
        url: "index.html",
        content: "Amazon ist ein Online-Marktplatz. Diese Seite ist ein Testeintrag für die Suche."
      }
    ];

    const input = document.getElementById("searchInput");
    const resultsDiv = document.getElementById("results");

    const urlParams = new URLSearchParams(window.location.search);
    const query = urlParams.get("q");

    if (query) {
      input.value = query;
      performSearch(query);
    }

    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        performSearch(input.value);
      }
    });

    function performSearch(q) {
      const query = q.trim().toLowerCase();
      resultsDiv.innerHTML = "";

      const results = pages.filter(page =>
        page.title.toLowerCase().includes(query) ||
        page.content.toLowerCase().includes(query)
      );

      if (results.length === 0) {
        resultsDiv.innerHTML = "<p>Keine Treffer gefunden.</p>";
        return;
      }

      results.forEach(item => {
        const div = document.createElement("div");
        div.className = "result-item";
        div.innerHTML = `
          <a href="${item.url}">${item.title}</a>
          <div class="result-desc">${item.content}</div>
        `;
        resultsDiv.appendChild(div);
      });
    }
  </script>

</body>
</html>
