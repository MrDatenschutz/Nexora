<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Quiz</title><style>body{font-family:Arial;background:linear-gradient(135deg,#6a11cb,#2575fc);padding:40px;display:flex;justify-content:center;}.card{background:white;width:520px;padding:25px;border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,0.3);animation:fadeIn 0.5s ease;}@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}.option{background:#f0f0f0;padding:12px;border-radius:10px;margin:10px 0;cursor:pointer;border:2px solid transparent;transition:0.2s;}.option:hover{background:#e0e0e0;}.correct{background:#c8f7c5!important;border-color:#2ecc71;}.wrong{background:#f7c5c5!important;border-color:#e74c3c;}#nextBtn{margin-top:20px;padding:12px;width:100%;background:#3498db;color:white;border:none;border-radius:10px;font-size:16px;cursor:pointer;display:none;}#nextBtn:hover{background:#217dbb;}</style></head><body><div class='card'><h2 id='question'></h2><div id='options'></div><div id='explanation'></div><button id='nextBtn'>Nächste Frage</button></div><script>const quiz=[{"question":"Wie hieß die erste Britische Königin ?","options":["Königin Anne","Lady Eleanor Finch","Lady Anne Fitzroy"],"correct":0,"explanation":"Königin Anne regierte seit 1707"},{"question":"Was in unserem Körper nimmt den größten Anteil ein ?","options":["Fleisch","Blut","Wasser"],"correct":2,"explanation":"Ein menschlicher Körper besteht zu 60% aus Wasser"},{"question":"Wie hieß der Erschaffer der ersten Automobils in Deutschland ?","options":["Wilhelm Maybach","Carl Benz","Gottlieb Daimler"],"correct":1,"explanation":"Das Benz Patent‑Motorwagen von 1885 gilt als das erste praxistaugliche Automobil der Welt."},{"question":"Was bedeutet das Wort \"Honett\" aus dem Althochdeutschen ?","options":["anständig","mutig","intelligent"],"correct":0,"explanation":"Beispiel aus älteren Texten:\n„Er war ein honetter Mann, der stets Wort hielt.“\n→ Heute würde man sagen: „Er war ein anständiger Mann.“"},{"question":"Welche Farbe hat ein Eisbär unter seinem Fell ?","options":["Weiß","Rosa","Schwarz"],"correct":2,"explanation":""},{"question":"Wie nennt man die Wissenschaft vom Altern ?","options":["Gerontologie","Ontologie","Mykologie"],"correct":0,"explanation":""},{"question":"Welche Pflanze kann am längsten ohne Wasser überleben ?","options":["Farn","Bambus","Kaktus"],"correct":2,"explanation":""},{"question":"Welches Tier hat das größte Herz ?","options":["Elefant","Blauwahl","Nashorn"],"correct":1,"explanation":""},{"question":"Welche Erfindung kam zuerst ?","options":["Dampfmaschine","Glühbirne","Telefon"],"correct":0,"explanation":""}];let current=0;let score=0;let userAnswers=[];const qEl=document.getElementById('question');const oEl=document.getElementById('options');const eEl=document.getElementById('explanation');const nextBtn=document.getElementById('nextBtn');function loadQuestion(){const q=quiz[current];qEl.textContent=q.question;oEl.innerHTML='';eEl.innerHTML='';nextBtn.style.display='none';q.options.forEach(function(text,index){const btn=document.createElement('div');btn.className='option';btn.textContent=text;btn.onclick=function(){document.querySelectorAll('.option').forEach(function(o){o.style.pointerEvents='none'});userAnswers.push(index);if(index===q.correct){btn.classList.add('correct');score++;}else{btn.classList.add('wrong');}eEl.innerHTML=q.explanation;nextBtn.style.display='block';};oEl.appendChild(btn);});}nextBtn.onclick=function(){current++;if(current<quiz.length)loadQuestion();else showResults();};function showResults(){qEl.textContent='Auswertung';oEl.innerHTML='';eEl.innerHTML='';quiz.forEach(function(q,i){const div=document.createElement('div');div.innerHTML='<b>'+q.question+'</b><br>Deine Antwort: '+(q.options[userAnswers[i]]||'Keine')+'<br>Richtige Antwort: <b>'+q.options[q.correct]+'</b><br><br>';oEl.appendChild(div);});}loadQuestion();</script></body></html>
