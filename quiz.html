<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Quiz</title><style>body{font-family:Arial;background:linear-gradient(135deg,#6a11cb,#2575fc);padding:40px;display:flex;justify-content:center;}.card{background:white;width:520px;padding:25px;border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,0.3);animation:fadeIn 0.5s ease;}@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}.option{background:#f0f0f0;padding:12px;border-radius:10px;margin:10px 0;cursor:pointer;border:2px solid transparent;transition:0.2s;}.option:hover{background:#e0e0e0;}.correct{background:#c8f7c5!important;border-color:#2ecc71;}.wrong{background:#f7c5c5!important;border-color:#e74c3c;}#nextBtn{margin-top:20px;padding:12px;width:100%;background:#3498db;color:white;border:none;border-radius:10px;font-size:16px;cursor:pointer;display:none;}#nextBtn:hover{background:#217dbb;}</style></head><body><div class='card'><h2 id='question'></h2><div id='options'></div><div id='explanation'></div><button id='nextBtn'>Nächste Frage</button></div><script>const quiz=[{"question":"Ab welchem Jahr war der erste Computer erwerbbar ?","options":["1943","1941","1946"],"correct":1,"explanation":""},{"question":"Was muss in Youtube im Link geändert werden, dass man das Video ohe Werbung ansehen kann ?","options":["ein \"-\" zwischen \"Yout\" und \"ube\"","ein \"-\" zwischen \"You\" und \"Tube\"","ein \"-\" zwischen \"Yo\" und \"uTube\""],"correct":0,"explanation":""},{"question":"Wer ist der Autor des Buches \"Das kleine Nachtgespenst\" ?","options":["Michael Ende","Otfried Preußler","Enid Blyton"],"correct":1,"explanation":""},{"question":"Was geschah am 10. November 1989 ?","options":["Der Berliner Mauerfall","Der Tod von Ronald Reagan","\"Der Club der toten Dichter\" wurde veröffentlicht"],"correct":2,"explanation":""},{"question":"Wie viele Bundesländer hat Deutschland ?","options":["10","16","15"],"correct":1,"explanation":""},{"question":"Welcher Planet ist der Sonne am nächsten ?","options":["Mars","Venus","Merkur"],"correct":2,"explanation":""},{"question":"Wie heißt die Hauptstadt von Kanada ?","options":["Ottawa","Toronto","Vancouver"],"correct":0,"explanation":""},{"question":"Was ist das chemische Symbol für Gold ?","options":["Gd","Au","Go"],"correct":1,"explanation":""},{"question":"Wie viele Kontinente hat die Erde ?","options":["7","8","9"],"correct":0,"explanation":""},{"question":"Wer malte Mona Lisa ?","options":["Leonardo da Vinci","Raphael","Donatello"],"correct":0,"explanation":""},{"question":"Wie viele Spieler stehen beim Fußball pro Team auf dem Feld ?","options":["10","11","12"],"correct":1,"explanation":""},{"question":"Welches Tier ist das größte lebende Landtier ?","options":["Afrikanischen Elefant","Giraffe","Australischen Elefant"],"correct":0,"explanation":""},{"question":"Welcher Fluss besitzt das meiste Wasser ?","options":["Amazonas","Nil","Mississippi"],"correct":1,"explanation":""},{"question":"Was ist die am meisten gesprochene Muttersprache","options":["Hindi","Englisch","Mandarin - Chinesisch"],"correct":2,"explanation":""},{"question":"Wie viele Tage hat ein Schaltjahr ?","options":["366","365","364"],"correct":0,"explanation":""},{"question":"Welches Element ist für die menschliche Atmung wichtig ?","options":["Stickstoff","Sauerstoff","Helium"],"correct":1,"explanation":""},{"question":"Welcher Kontinent ist flächenbezogen der Größte ?","options":["Nordamerika","Afrika","Asien"],"correct":2,"explanation":""},{"question":"Wie viele Zähne hat ein durchschnittlicher Erwachsener normalerweise ?","options":["35","32","30"],"correct":1,"explanation":""},{"question":"Welches Tier legt Eier ?","options":["Schnabeltier","Hahn","Känguru"],"correct":0,"explanation":""},{"question":"Welche Katzenrasse ist die Seltenste ?","options":["Singapura","Türkisch Angora","Savannah-Katze"],"correct":0,"explanation":""},{"question":"Wann wurde die Bibel von Martin Luther übersetzt ?","options":["1521","1632","1478"],"correct":0,"explanation":""},{"question":"In welcher Zeitspanne gehörte der Afrikanische Staat Kamerun zur deutschen Kolonie ?","options":["1889 - 1910","1884 - 1916","Nie"],"correct":1,"explanation":""},{"question":"Wer wurde 2021 zum Friedensnobelpreisträger gekürt ?","options":["Maria Ressa","Dmitri Muratow","Ales Bjaljazki"],"correct":0,"explanation":""},{"question":"Welchen Ländern gehört das ARTE Programm im Fernsehen ?","options":["Frankreich + Deutschland + Belgien","Frankreich + Deutschland","Frankreich + Deutschland + Schweiz"],"correct":1,"explanation":""},{"question":"Wie hieß der französische Politiker, der den Élysée Vertrag unterzeichnete ?","options":["Charles de Gaulle","Emmanuel Macron","François Mitterrand"],"correct":0,"explanation":""},{"question":"Von welchem Tier stammt die Bifi ?","options":["Schwein","Rind","Huhn"],"correct":0,"explanation":""},{"question":"Welche 2 € Umlaufmünze wurde am 27.12.2025 für 2026 angekündigt ?","options":["Konrad Adenauer","Jubeljahr","Bartgeier"],"correct":0,"explanation":""},{"question":"Welcher großen Stadt in Bayern liegt Pommelsbrunn am nächsten ?","options":["Nürnberg","Erlangen","Regensburg"],"correct":0,"explanation":""}];let current=0;let score=0;let userAnswers=[];const qEl=document.getElementById('question');const oEl=document.getElementById('options');const eEl=document.getElementById('explanation');const nextBtn=document.getElementById('nextBtn');function loadQuestion(){const q=quiz[current];qEl.textContent=q.question;oEl.innerHTML='';eEl.innerHTML='';nextBtn.style.display='none';q.options.forEach(function(text,index){const btn=document.createElement('div');btn.className='option';btn.textContent=text;btn.onclick=function(){document.querySelectorAll('.option').forEach(function(o){o.style.pointerEvents='none'});userAnswers.push(index);if(index===q.correct){btn.classList.add('correct');score++;}else{btn.classList.add('wrong');}eEl.innerHTML=q.explanation;nextBtn.style.display='block';};oEl.appendChild(btn);});}nextBtn.onclick=function(){current++;if(current<quiz.length)loadQuestion();else showResults();};function showResults(){qEl.textContent='Auswertung';oEl.innerHTML='';eEl.innerHTML='';quiz.forEach(function(q,i){const div=document.createElement('div');div.innerHTML='<b>'+q.question+'</b><br>Deine Antwort: '+(q.options[userAnswers[i]]||'Keine')+'<br>Richtige Antwort: <b>'+q.options[q.correct]+'</b><br><br>';oEl.appendChild(div);});}loadQuestion();</script></body></html>
