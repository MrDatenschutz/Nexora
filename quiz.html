<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Quiz</title><style>body{font-family:Arial;background:linear-gradient(135deg,#6a11cb,#2575fc);padding:40px;display:flex;justify-content:center;}.card{background:white;width:520px;padding:25px;border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,0.3);animation:fadeIn 0.5s ease;}@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}.option{background:#f0f0f0;padding:12px;border-radius:10px;margin:10px 0;cursor:pointer;border:2px solid transparent;transition:0.2s;}.option:hover{background:#e0e0e0;}.correct{background:#c8f7c5!important;border-color:#2ecc71;}.wrong{background:#f7c5c5!important;border-color:#e74c3c;}#nextBtn{margin-top:20px;padding:12px;width:100%;background:#3498db;color:white;border:none;border-radius:10px;font-size:16px;cursor:pointer;display:none;}#nextBtn:hover{background:#217dbb;}</style></head><body><div class='card'><h2 id='question'></h2><div id='options'></div><div id='explanation'></div><button id='nextBtn'>Nächste Frage</button></div><script>const quiz=[{"question":"Wie viel Prozent der globalen Währung ist digital ?","options":["92 %","24 %","65 %"],"correct":0,"explanation":""},{"question":"Wie alt ist das älteste bekannteste Kunstwerk ?","options":["200.000 Jahre","44.000 Jahre","9.000 Jahre"],"correct":1,"explanation":""},{"question":"Wie lang braucht ein Faultier um sein Essen zu verdauen ?","options":["2 Wochen","48 Stunden","9 Tage"],"correct":0,"explanation":""},{"question":"Was ist die maximale Länge eines männlichen Bartes, wenn dieser nie rasiert wird ?","options":["8,3 m","4,3 m","12,3 m"],"correct":0,"explanation":""},{"question":"Welche Länge hat die Linie, die man mit einem durchschnittlichen Bleistift zeichnen kann ?","options":["1 km","212 km","56 km"],"correct":2,"explanation":""},{"question":"Wie viele Käsesorten hat Europa mehr als jeder andere Kontinent ?","options":["3.000","4.000","5.550"],"correct":1,"explanation":""},{"question":"Wie viele Weihnachtsbäume werden pro Jahr in Deutschland verkauft ?","options":["30.000.000","12.000.000","78.000.000"],"correct":0,"explanation":""},{"question":"Wie viele Apps sind aktuell im Appfall App Store verfügbar ?","options":["100.000.000","46.000.000","2.000.000"],"correct":2,"explanation":""},{"question":"Wie viele Hotdogs hat Joey Chestnut 2020 in 10 min gegessen ?","options":["75","51","Der Rekord wurde nicht 2020 aufgestellt"],"correct":0,"explanation":""},{"question":"Wie viele Bandscheiben hat ein Mensch ?","options":["32","23","43"],"correct":1,"explanation":""},{"question":"Wie viele Pakete erhält ein durchschnittlicher Deutscher pro Jahr (Stand 2025) ?","options":["40","55","71"],"correct":1,"explanation":""},{"question":"Wie viele Meter legt ein durchschnittlicher Postbote pro Jahr zu Fuß zurück ?","options":["2.500 km","9.000 km","1.200 km"],"correct":0,"explanation":""},{"question":"Wie viel Gramm wiegt eine Wolke (Cumulus) ?","options":["500.000","200.000","100.000"],"correct":0,"explanation":""},{"question":"Wie viele Schritte benötigt ein durchschnittlicher Mensch für 1 km ?","options":["1.299","1.300","1.301"],"correct":2,"explanation":""},{"question":"Wie oft schlägt ein Kolibri Herz pro Minute ?","options":["1.000","1.200","15.000"],"correct":1,"explanation":""},{"question":"Was ist die gesamte Anzahl der Pixel eines durchschnittlichen Full - HD - Bildschirms ?","options":["2.073.600","2.073.500","2.070.850"],"correct":0,"explanation":""},{"question":"Wie viele Millimeter wächst ein menschliches Haar pro Tag ?","options":["3 mm","0,35 mm","1,2 mm"],"correct":1,"explanation":""},{"question":"Wie viele Blütenblätter hat eine durchschnittliche Sonnenblume ?","options":["30","32","34"],"correct":2,"explanation":""},{"question":"Wie viele Kerne besitzt ein durchschnittlicher Sonnenblumenkopf ?","options":["500","1.000","1.500"],"correct":2,"explanation":""},{"question":"Wie viele Liter Milch gibt ein durchschnittliche Kuh am Tag ?","options":["25 l","20 l","15 l"],"correct":0,"explanation":""},{"question":"Wie viele kg wiegt ein Kubikmeter Holz (Eiche + trocken) ?","options":["800 kg","700 kg","1.000 kg"],"correct":1,"explanation":""},{"question":"Wie viele Stunden verbringt ein durchschnittlicher Mensch im Leben mit Essen ?","options":["100.000 h","35.000 h","60.000 h"],"correct":1,"explanation":""},{"question":"Wie viele Liter Blut fließen pro Tag durch ein menschliches Herz ?","options":["10.000 l","7.000 l","100 l"],"correct":1,"explanation":""},{"question":"Wie viele Zähne hat ein Erwachsenes Nilpferd ?","options":["36","32","28"],"correct":0,"explanation":""},{"question":"Wie viele Meter legt ein Gebhard bei Höchstgeschwindigkeit in 3 sek. zurück ?","options":["100 m","90 m","200 m"],"correct":1,"explanation":""},{"question":"Wie viele Sterne sind von der Erde aus mit bloßem Auge sichtbar ?","options":["50.000","3.000","250.000"],"correct":1,"explanation":""},{"question":"Wie viele Knochen besitzt ein Regenwurm ?","options":["0","102","115"],"correct":0,"explanation":""},{"question":"Wie groß ist der Sichtwinkel eines menschlichen Auges ?","options":["180° - 210°","135° - 150°","200° - 245°","0°"],"correct":0,"explanation":""},{"question":"Wie viele Email Anbieter gibt es Weltweit ?","options":["1.000","500","102.257"],"correct":1,"explanation":""}];let current=0;let score=0;let userAnswers=[];const qEl=document.getElementById('question');const oEl=document.getElementById('options');const eEl=document.getElementById('explanation');const nextBtn=document.getElementById('nextBtn');function loadQuestion(){const q=quiz[current];qEl.textContent=q.question;oEl.innerHTML='';eEl.innerHTML='';nextBtn.style.display='none';q.options.forEach(function(text,index){const btn=document.createElement('div');btn.className='option';btn.textContent=text;btn.onclick=function(){document.querySelectorAll('.option').forEach(function(o){o.style.pointerEvents='none'});userAnswers.push(index);if(index===q.correct){btn.classList.add('correct');score++;}else{btn.classList.add('wrong');}eEl.innerHTML=q.explanation;nextBtn.style.display='block';};oEl.appendChild(btn);});}nextBtn.onclick=function(){current++;if(current<quiz.length)loadQuestion();else showResults();};function showResults(){qEl.textContent='Auswertung';oEl.innerHTML='';eEl.innerHTML='';quiz.forEach(function(q,i){const div=document.createElement('div');div.innerHTML='<b>'+q.question+'</b><br>Deine Antwort: '+(q.options[userAnswers[i]]||'Keine')+'<br>Richtige Antwort: <b>'+q.options[q.correct]+'</b><br><br>';oEl.appendChild(div);});}loadQuestion();</script></body></html>
